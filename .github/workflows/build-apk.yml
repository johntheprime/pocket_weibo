# Build a debug APK on push to `apk-build` (same branch name on a fork runs on the fork).
#
# Repository settings (upstream and fork if you use Actions there):
#   Settings → Actions → General → Workflow permissions → "Read and write permissions"
#   (Required so GITHUB_TOKEN can create/update the release below.)
#
# GitHub also attaches "Source code (zip/tar.gz)" for the release tag automatically;
# this workflow additionally uploads a separate git-archive tarball of the exact
# commit used for the build.
#
# To trigger: push to `apk-build`, or run manually (workflow_dispatch).

name: Build APK

on:
  push:
    branches:
      - apk-build
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create/update GitHub release apk-latest with APK + source tarball"
        type: boolean
        default: true
      prerelease:
        description: "Mark release as pre-release (uncheck for a full / latest release)"
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (API 34)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: |
          chmod +x gradlew
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Pack source at this commit (tar.gz)
        run: |
          SRC="pocket-weibo-source-${{ github.sha }}.tar.gz"
          git archive --format=tar.gz --prefix="pocket-weibo-${{ github.sha }}/" -o "$SRC" HEAD
          ls -la "$SRC"

      - name: Upload APK and source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-weibo-debug-${{ github.run_number }}-${{ github.sha }}
          path: |
            app/build/outputs/apk/debug/*.apk
            pocket-weibo-source-*.tar.gz
          if-no-files-found: error

      - name: Publish rolling release (tag apk-latest)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true) }}
        uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: apk-latest
          prerelease: ${{ github.event_name == 'push' || inputs.prerelease == true }}
          title: PocketWeibo debug APK + source
          files: |
            app/build/outputs/apk/debug/*.apk
            pocket-weibo-source-*.tar.gz
