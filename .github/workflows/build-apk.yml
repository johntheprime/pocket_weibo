# Build a **signed release** APK on push to `apk-build`.
#
# **Why release + one keystore:** GitHub-hosted `assembleDebug` APKs are signed with a
# fresh debug key every run, so Android treats each download as a different app (no upgrade,
# data lost on reinstall). CI writes `keystore.properties` + `ci-release.keystore` from
# repository secrets so every published APK shares the **same** signature and upgrades in place
# as long as `versionCode` increases (see `app/build.gradle.kts`).
#
# **Secrets** (repo Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64 — base64 of a PKCS12 or JKS keystore file (generate once, reuse forever)
#   KEYSTORE_PASSWORD — keystore password
#   KEY_PASSWORD — optional; if omitted, KEYSTORE_PASSWORD is used (typical for PKCS12)
#   KEY_ALIAS — optional; default alias in Gradle is `pocketweibo` if unset
#
# Generate a keystore once (example PKCS12, 10000 days):
#   keytool -genkeypair -v -storetype PKCS12 -keystore pocket-weibo-release.keystore \
#     -alias pocketweibo -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w0 pocket-weibo-release.keystore   # Linux; macOS: base64 pocket-weibo-release.keystore
#
# Each successful publish creates a **new** GitHub release with a unique tag. APK and tarball
# names include versionName/versionCode from `app/build.gradle.kts`.
#
# Repository settings: Actions → General → Workflow permissions → "Read and write permissions".
#
# To trigger: push to `apk-build`, or run manually (workflow_dispatch).

name: Build APK

on:
  push:
    branches:
      - apk-build
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a new GitHub release (versioned tag + APK + source tarball)"
        type: boolean
        default: true
      prerelease:
        description: "Mark release as pre-release (uncheck for a full / latest release)"
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from Gradle
        id: appver
        run: |
          set -euo pipefail
          VN=$(sed -n 's/.*versionName *= *"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)
          VC=$(sed -n 's/.*versionCode *= *\([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -1)
          if [ -z "$VN" ] || [ -z "$VC" ]; then
            echo "Failed to parse versionName/versionCode from app/build.gradle.kts"
            exit 1
          fi
          echo "version_name=$VN" >> "$GITHUB_OUTPUT"
          echo "version_code=$VC" >> "$GITHUB_OUTPUT"
          echo "App version: $VN (code $VC)"

      - name: Configure release signing (stable signature for upgrades)
        env:
          KS_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${KS_BASE64:-}" ]; then
            echo "::error::Missing secret ANDROID_KEYSTORE_BASE64. Without a fixed release keystore, each CI APK would use a different debug signature and Android would not upgrade in place. See workflow header comments in .github/workflows/build-apk.yml and FIX.md."
            exit 1
          fi
          if [ -z "${KS_PASSWORD:-}" ]; then
            echo "::error::Missing KEYSTORE_PASSWORD secret."
            exit 1
          fi
          KEY_PASS="${KEY_PASSWORD:-$KS_PASSWORD}"
          echo "$KS_BASE64" | base64 -d > "$GITHUB_WORKSPACE/ci-release.keystore"
          chmod 600 "$GITHUB_WORKSPACE/ci-release.keystore"
          umask 077
          {
            echo "storeFile=ci-release.keystore"
            echo "storePassword=${KS_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS:-pocketweibo}"
            echo "keyPassword=${KEY_PASS}"
          } > "$GITHUB_WORKSPACE/keystore.properties"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (API 34)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble signed release APK
        run: |
          chmod +x gradlew
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK with version and run id
        id: apkname
        run: |
          set -euo pipefail
          VN="${{ steps.appver.outputs.version_name }}"
          VC="${{ steps.appver.outputs.version_code }}"
          SRC=$(ls app/build/outputs/apk/release/*.apk | head -1)
          DEST="pocket-weibo-release-v${VN}-${VC}-r${{ github.run_number }}-${{ github.run_attempt }}.apk"
          mv "$SRC" "$DEST"
          echo "apk_file=$DEST" >> "$GITHUB_OUTPUT"
          ls -la "$DEST"

      - name: Pack source at this commit (tar.gz)
        run: |
          set -euo pipefail
          VN="${{ steps.appver.outputs.version_name }}"
          VC="${{ steps.appver.outputs.version_code }}"
          SRC="pocket-weibo-v${VN}-${VC}-source-${{ github.sha }}.tar.gz"
          git archive --format=tar.gz --prefix="pocket-weibo-${{ github.sha }}/" -o "$SRC" HEAD
          ls -la "$SRC"

      - name: Upload APK and source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-weibo-release-${{ steps.appver.outputs.version_name }}-${{ steps.appver.outputs.version_code }}-${{ github.run_number }}-${{ github.sha }}
          path: |
            pocket-weibo-release-v*.apk
            pocket-weibo-v*-source-*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release (unique tag each run)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ steps.appver.outputs.version_name }}-${{ steps.appver.outputs.version_code }}-r${{ github.run_number }}-${{ github.run_attempt }}
          name: PocketWeibo v${{ steps.appver.outputs.version_name }} (${{ steps.appver.outputs.version_code }}) - run ${{ github.run_number }}
          body: |
            **Signed release** APK (same signing key as previous CI releases once secrets are configured), built from `${{ github.sha }}` on `${{ github.ref_name }}`.

            Bump `versionCode` (and usually `versionName` semver) in `app/build.gradle.kts` before each release you expect users to upgrade to.

            - **APK:** `${{ steps.apkname.outputs.apk_file }}`
            - **versionName:** ${{ steps.appver.outputs.version_name }}
            - **versionCode:** ${{ steps.appver.outputs.version_code }}
          files: |
            pocket-weibo-release-v*.apk
            pocket-weibo-v*-source-*.tar.gz
          prerelease: ${{ github.event_name == 'push' || inputs.prerelease == true }}
          generate_release_notes: true
