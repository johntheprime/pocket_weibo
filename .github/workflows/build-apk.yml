# Build a debug APK on push to `apk-build` (same branch name on a fork runs on the fork).
#
# Each successful publish creates a **new** GitHub release with a unique tag (no
# overwriting `apk-latest`). The uploaded APK filename includes `versionName` and
# `versionCode` from `app/build.gradle.kts`, plus run id, so artifacts are easy to tell apart.
#
# Repository settings (upstream and fork if you use Actions there):
#   Settings → Actions → General → Workflow permissions → "Read and write permissions"
#   (Required so GITHUB_TOKEN can create releases.)
#
# To trigger: push to `apk-build`, or run manually (workflow_dispatch).

name: Build APK

on:
  push:
    branches:
      - apk-build
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a new GitHub release (versioned tag + APK + source tarball)"
        type: boolean
        default: true
      prerelease:
        description: "Mark release as pre-release (uncheck for a full / latest release)"
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from Gradle
        id: appver
        run: |
          set -euo pipefail
          VN=$(sed -n 's/.*versionName *= *"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)
          VC=$(sed -n 's/.*versionCode *= *\([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -1)
          if [ -z "$VN" ] || [ -z "$VC" ]; then
            echo "Failed to parse versionName/versionCode from app/build.gradle.kts"
            exit 1
          fi
          echo "version_name=$VN" >> "$GITHUB_OUTPUT"
          echo "version_code=$VC" >> "$GITHUB_OUTPUT"
          echo "App version: $VN (code $VC)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (API 34)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: |
          chmod +x gradlew
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with version and run id
        id: apkname
        run: |
          set -euo pipefail
          VN="${{ steps.appver.outputs.version_name }}"
          VC="${{ steps.appver.outputs.version_code }}"
          SRC=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          DEST="pocket-weibo-debug-v${VN}-${VC}-r${{ github.run_number }}-${{ github.run_attempt }}.apk"
          mv "$SRC" "$DEST"
          echo "apk_file=$DEST" >> "$GITHUB_OUTPUT"
          ls -la "$DEST"

      - name: Pack source at this commit (tar.gz)
        run: |
          set -euo pipefail
          VN="${{ steps.appver.outputs.version_name }}"
          VC="${{ steps.appver.outputs.version_code }}"
          SRC="pocket-weibo-v${VN}-${VC}-source-${{ github.sha }}.tar.gz"
          git archive --format=tar.gz --prefix="pocket-weibo-${{ github.sha }}/" -o "$SRC" HEAD
          ls -la "$SRC"

      - name: Upload APK and source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-weibo-debug-${{ steps.appver.outputs.version_name }}-${{ steps.appver.outputs.version_code }}-${{ github.run_number }}-${{ github.sha }}
          path: |
            pocket-weibo-debug-v*.apk
            pocket-weibo-v*-source-*.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release (unique tag each run)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ steps.appver.outputs.version_name }}-${{ steps.appver.outputs.version_code }}-r${{ github.run_number }}-${{ github.run_attempt }}
          name: PocketWeibo v${{ steps.appver.outputs.version_name }} (${{ steps.appver.outputs.version_code }}) - run ${{ github.run_number }}
          body: |
            Debug APK built from `${{ github.sha }}` on `${{ github.ref_name }}`.

            - **APK:** `${{ steps.apkname.outputs.apk_file }}`
            - **versionName:** ${{ steps.appver.outputs.version_name }}
            - **versionCode:** ${{ steps.appver.outputs.version_code }}
          files: |
            pocket-weibo-debug-v*.apk
            pocket-weibo-v*-source-*.tar.gz
          prerelease: ${{ github.event_name == 'push' || inputs.prerelease == true }}
          generate_release_notes: true
