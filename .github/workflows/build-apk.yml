# Build a debug APK on push to `apk-build` (same branch name on a fork runs on the fork).
#
# Repository settings (upstream and fork if you use Actions there):
#   Settings → Actions → General → Workflow permissions → "Read and write permissions"
#   (Required so GITHUB_TOKEN can create/update the pre-release below.)
#
# Optional: Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"
#   is not required for this workflow.
#
# To trigger a build: push to branch `apk-build`, or run this workflow manually (workflow_dispatch).

name: Build APK

on:
  push:
    branches:
      - apk-build
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: "Create/update GitHub pre-release apk-latest with the APK"
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (API 34)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: |
          chmod +x gradlew
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-weibo-debug-${{ github.run_number }}-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish pre-release (rolling tag apk-latest)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_prerelease) }}
        uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: apk-latest
          prerelease: true
          title: PocketWeibo debug APK
          files: |
            app/build/outputs/apk/debug/*.apk
